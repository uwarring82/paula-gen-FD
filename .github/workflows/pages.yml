name: Deploy docs site to Pages

# Renders the docs/ static site (homepage + technical notes) with pandoc and
# publishes it to GitHub Pages. The committed figures (docs/figures/*.png) are used
# as-is — only the Markdown notes are re-rendered to HTML, so the data-overlay plots
# keep their measured points (the raw .dat files are local-only, ADR-0002).
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Render the site (homepage + notes -> HTML)
        run: python docs/build_site.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
