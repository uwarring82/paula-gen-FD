name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validator self-tests (the wall + inheritance tests must fire)
        run: pytest -q validator/

      - name: Validate the parameter substrate (schema + graph invariants)
        run: python validator/validate.py

      - name: Twin spike — engine + runner tests
        run: pytest -q spike/

      - name: Twin spike — reproduce all benchmarks from ledger inputs
        run: python -m spike.validate_twin
