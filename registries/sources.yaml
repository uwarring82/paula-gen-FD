# =============================================================================
# sources registry  —  citation key -> resolvable bibliographic entry
# =============================================================================
# Every record's source.ref resolves here. The PDFs themselves are NOT committed
# (ADR-0002); this registry is the canonical, citable list.
#
# Resolvability was verified on 2026-06-18 (HTTP 200 / DOI / URN resolution).
# FreiDok dissertations carry a DOI of the form 10.6094/UNIFR/{recordID}.
# `verified: true` = the identifier was confirmed to resolve.
# `archived: false` + `verified: false` = no public copy found; the source is
# registered honestly with whatever secondary evidence exists (FAIR: document
# the accessibility gap rather than hide the source). The validator WARNS on
# referenced sources that are unresolvable or unverified.
# =============================================================================

