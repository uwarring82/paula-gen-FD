  units: "k-vector Delta_k/k (trap x,y,z)"
  kind: input
  uncertainty: {value: 0.0, type: exact}
  source: {ref: doerr2024, loc: "Sec. 2.1.4, p. 12 (beam combinations)", extraction_note: "Orthogonal Carrier OC = B1 (pi) + R2 (sigma+ - sigma-) in an orthogonal configuration -> Delta_k parallel to the z-axis. Addresses the axial low-frequency (lf) mode (~1.3 MHz).", extracted_by: claude-agent, extracted_on: 2026-06-18}
  scope: {isotope: 25Mg, subsystem: optics}
