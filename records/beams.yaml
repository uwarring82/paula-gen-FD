# =============================================================================
# records/beams.yaml  —  BEAMS domain
# Raman pair, cooling, preparation, detection beams. Each beam parameter
# (power, detuning, k-vector, polarisation, waist at the ion) is input by
# default — the twin consumes it (invariant 5).
#
# PROVENANCE: automated extraction (docs/LOGBOOK.md, 2026-06-18), unreviewed.
# Coverage, not completeness: beam waists and powers were NOT locatable with a
# precise source in this pass and are deliberately omitted rather than guessed.
# =============================================================================

- name: raman_detuning_from_p32
  value: 20.0e9
  units: Hz
  kind: input                     # beam detuning the twin consumes (input by default)
  uncertainty: {value: 1.0e9, type: systematic}   # nominal value; tolerance estimated, not stated
  source:
    ref: doerr2024
    loc: "Sec. 2.1.4, p. 11"
    extraction_note: >-
      Two-photon stimulated-Raman (TPSR) single-photon detuning of the virtual
      level from the 3P_3/2 |F=4,mF=4> state: Delta_R/(2pi) = 20 GHz. Restated
      in the level-scheme caption (Fig. 2.1, p. 7). The driven S->P transition
      is near 280 nm. Verbatim: "...detuned by Delta_R/(2pi) = 20 GHz from the
      P3/2 |F = 4, mF = 4> state".
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  caveats: >-
    Quoted as a round nominal value (20 GHz); the recorded uncertainty is an
    estimated tolerance, not a stated error. Beam configuration slot (raman_R*)
    not asserted pending confirmation of the actual setting label, so
    configuration is omitted.
  status: provisional

# =============================================================================
# Doppler cooling (BD), detection (BDX) and preparation (RD/RP) beams — the
# lab labels. The Blue Doppler (BD) laser (~279.635 nm, S1/2 -> P3/2, sigma+) is
# AOM-split into BDX (near resonance, detection), BD (~Gamma/2 red, Doppler-limit
# cooling) and BDD (far red, cooling hot ions); all drive the cycling transition
# |down> = |F=3,mF=3> <-> P3/2 |F=4,mF=4>. RD/RP (sigma+) optically pump the ion
# into |down> for preparation. Powers and waists at the ion are NOT given in the
# sources and are omitted (flagged), so this is coverage, not completeness.
# =============================================================================

- name: mg_p32_natural_linewidth
  value: 4.2e7                    # Gamma/(2pi) ~ 42 MHz
  units: Hz
  kind: input
  uncertainty: {value: 2.0e6, type: systematic}   # quoted "approximately 42 MHz"
  source:
    ref: kaufmann2022
    loc: "Sec. 2.1.4, p. 10"
    extraction_note: >-
      Natural linewidth Gamma/(2pi) ~ 42 MHz of the 25Mg+ 3p 2P_3/2 cooling
      transition (~280 nm). Sets the Doppler limit (~1 mK) and the BD cooling
      detuning (~Gamma/2). Also stated in Doerr 2024.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  configuration: null             # atomic constant (apparatus-independent)
  caveats: "Atomic constant; quoted approximately. The literature 2P_3/2 linewidth is ~41.8 MHz."
  status: provisional

- name: bd_laser_wavelength
  value: 2.79635e-7               # m (279.635 nm)
  units: m
  kind: input
  uncertainty: {value: 5.0e-12, type: systematic}
  source:
    ref: kaufmann2022
    loc: "Sec. 2.1.4, p. 10 (279.635 nm)"
    extraction_note: >-
      Blue Doppler (BD) laser wavelength, 279.635 nm, driving the 25Mg+
      S_1/2 -> P_3/2 cooling/detection transition.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  configuration: null             # transition wavelength (atomic)
  caveats: "Transition wavelength (apparatus-independent)."
  status: provisional

- name: bd_doppler_cooling_detuning
  value: -2.0e7                   # Hz, ~ -Gamma/2 (red)
  units: Hz
  kind: input
  uncertainty: {value: 2.0e6, type: systematic}
  source:
    ref: doerr2024
    loc: "Sec. 2.1.1, p. 9"
    extraction_note: >-
      BD (Blue Doppler) cooling-beam detuning ~ -20 MHz = -Gamma/2 (half the
      natural linewidth, red), used to Doppler-cool to the ~1 mK limit. sigma+
      polarised; drives |down>=|3,3> <-> P3/2|4,4>. Verbatim: "detuned by ~20 MHz,
      which is half of the natural linewidth".
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "Blue Doppler cooling beam; sigma+; |3,3> <-> P3/2|4,4>; ~ -Gamma/2 red"
  caveats: "Quoted '~20 MHz = half linewidth'. Beam power/waist at the ion not given (omitted)."
  status: provisional

- name: bdd_far_cooling_detuning
  value: -4.2e8                   # Hz, ~ -10 Gamma (far red)
  units: Hz
  kind: input
  uncertainty: {value: 8.0e7, type: systematic}   # ~10-12 Gamma range
  source:
    ref: kaufmann2022
    loc: "Sec. 2.1.4, p. 10 (~10-12 Gamma)"
    extraction_note: >-
      BDD (Blue Doppler Detuned) far-red cooling beam, detuned ~10-12 Gamma
      (~420-500 MHz) to capture/cool hot ions. Recorded at ~ -10 Gamma. Doerr
      2024 describes it qualitatively as 'far red-detuned, Doppler cooling fast
      ions'.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  conditions: "Blue Doppler Detuned (far-red) cooling beam; cools hot ions"
  caveats: "Kaufmann quotes ~10 Gamma and ~12 Gamma for two cooling components; the value/uncertainty span that range. Confirm the exact setting."
  status: provisional

- name: bdx_detection_detuning
  value: 0.0                      # Hz, near resonance
  units: Hz
  kind: input
  uncertainty: {value: 5.0e6, type: systematic}   # 'near resonance'; exact small detuning unspecified
  source:
    ref: doerr2024
    loc: "Sec. 2.1.1, p. 9"
    extraction_note: >-
      BDX (Blue Doppler Detection) beam operated NEAR RESONANCE (detuning ~ 0)
      for fluorescence detection of |down>; from it the probability P_down is
      read out. sigma+; drives |3,3> <-> P3/2|4,4>.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: detection}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "Blue Doppler Detection beam; near resonance; sigma+; fluorescence readout of |down>"
  caveats: "'Near resonance' only — the exact small detuning is not stated; recorded as 0 with a ~few-MHz uncertainty. Power/waist not given."
  status: provisional

- name: rd_repump_polarization
  value: "sigma+"
  units: polarization
  kind: input
  uncertainty: {value: 0, type: exact}
  source:
    ref: doerr2024
    loc: "Sec. 2.1.1, p. 9"
    extraction_note: >-
      RD (Red Doppler) preparation beam: sigma+ polarised, excites S_1/2 |F=2>
      to the P state (Doerr's beam section says P_1/2; cf. a separate statement
      P_3/2 F=3), driving dmF=+1, repumping toward |down>. Detuning/power/waist
      not stated; the recorded quantity is the polarisation.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "Red Doppler preparation beam; S1/2 F=2 -> P; dmF=+1; pumps toward |down>"
  caveats: >-
    Categorical record (polarisation) — no numeric detuning/power/waist in the
    source. Excited-state target ambiguous in Doerr (P_1/2 in the beam section
    vs P_3/2 F=3 elsewhere); flag for confirmation.
  status: provisional

- name: rp_repump_polarization
  value: "sigma+"
  units: polarization
  kind: input
  uncertainty: {value: 0, type: exact}
  source:
    ref: doerr2024
    loc: "Sec. 2.1.1, p. 9"
    extraction_note: >-
      RP (Repumper) preparation beam: sigma+ polarised, pumps the ion from
      S_1/2 |F=3> to the P state (increasing mF), repumping toward |down>.
      Detuning/power/waist not stated; the recorded quantity is the polarisation.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "Repumper preparation beam; S1/2 F=3 -> P; pumps mF up toward |down>"
  caveats: "Categorical record (polarisation); no numeric detuning/power/waist in the source. Same P_1/2 vs P_3/2 ambiguity as rd_repump_polarization."
  status: provisional
