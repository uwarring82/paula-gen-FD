# --- AC-Stark (light shift) benchmark ----------------------------------------
# Only the FAR-detuned BDD beam has a meaningful coherent light shift; the
# near-resonant BD/BDX/RD/RP beams scatter instead (see spike/engines/acstark.py).

- name: bdd_ac_stark_shift_25mg
  value: 1.0e7                    # |delta_AC| ~ 2pi x 10 MHz (magnitude)
  units: Hz
  kind: benchmark                 # the acstark engine reproduces it from s, Gamma, delta
  uncertainty: {value: 2.0e6, type: systematic}    # "about 10 MHz, depending on power"
  source:
    ref: hasse2025
    loc: "Sec. 3.1.3 (state initialization), p. 71"
    extraction_note: >-
      The off-resonant BDD beam (delta = -10 Gamma, s ~ 20) "induces an ac Stark
      shift of about 2pi x 10 MHz depending on the specific power level, which
      shifts the resonance of the cycling transition to higher frequencies".
      Hasse states the resonant repumpers RD/RP induce NO significant shift.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: hasse
  measured_on: 2025-01-01         # APPROXIMATE: Hasse 2025 thesis era; exact date not in source
  conditions: "BDD beam (delta = -10 Gamma, s ~ 20) on the S1/2->P3/2 cycling transition"
  caveats: >-
    Magnitude only ("about 2pi x 10 MHz, power-dependent"). The acstark engine
    predicts |delta_AC| = s*Gamma^2/(8|delta|) = 10.4 MHz from bdd_far_cooling_*
    and mg_p32_natural_linewidth. The near-resonant beams (BD/BDX/RD/RP) have no
    meaningful coherent AC-Stark shift (they scatter), per Hasse. NOTE the linewidth
    is generation-dependent: this prediction uses Clos's Gamma/2pi = 41.8 MHz, while
    Hasse 2025 itself quotes 42.7 MHz (-> 10.68 MHz); both are within the 2 MHz
    benchmark band, so the agreement is robust. measured_on is approximate (thesis
    era); the section label (3.1.3) should be spot-checked against the Hasse PDF.
  status: provisional

# --- detection efficiency (Friedenauer; feeds the detection engine) -----------

- name: mg_detection_efficiency_25mg
  value: 5.6e-3                   # fraction of emitted photons detected
  units: dimensionless
  kind: input
  uncertainty: {value: 1.0e-3, type: systematic}
  source:
    ref: friedenauer2010
    loc: "Sec. 2 (p. 25)"
    extraction_note: >-
      Photon detection efficiency of 25Mg+ fluorescence = product of three
      factors: 4.7% solid-angle collection x (1 - 14% Schott-filter/mirror loss)
      x 14% PMT quantum efficiency at 280 nm = 0.047 * 0.86 * 0.14 = 5.66e-3 ~
      5.6 per-mille of emitted photons detected; fluorescence count rate Rcount
      ~ 250 kHz at saturation. Verbatim: "we detect 5.6 per-mille of the total
      number of emitted photons".
    extracted_by: claude-agent
    extracted_on: 2026-06-19
  scope: {isotope: 25Mg, subsystem: detection}
  observation_type: direct
  derived_from: []
  generation: legacy
  caveats: >-
    From the LMU/MPQ predecessor apparatus (Friedenauer); the Freiburg value DOES
    differ - Thomm 2021 now gives the actual PAULA detection directly:
    mg_bright_counts_25mg = 2.682/30us (~89 kHz, vs Friedenauer's 250 kHz) and
    fidelities mg_readout_fidelity_bright/dark_25mg = 99.4/97.4% (vs Schmitz/LMU
    >99.99%). Prefer the Thomm count levels for the twin's detection step; keep this
    efficiency only as the first-principles eta = R_scatter -> mu_bright sanity check.
  status: provisional

