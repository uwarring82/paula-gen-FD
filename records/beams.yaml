# =============================================================================
# records/beams.yaml  —  BEAMS domain
# Raman pair, cooling (BD), detection (BDX), preparation (RD/RP) beams. Each beam
# parameter (power/intensity, detuning, k-vector, polarisation, waist at the ion)
# is input by default — the twin consumes it (invariant 5).
#
# Canonical source: the laser-parameter table (Clos 2017, Tab. 3.2 "Specifications
# of all laser systems"; confirmed by Wittemer 2019, Tab. 3.1), giving per beam: wavelength, polarisation,
# transition, natural linewidth Gamma_nat/(2pi), detuning Delta/Gamma_nat, and
# intensity I/Isat (the saturation parameter s). All BD/RD beams are sigma+.
# Detunings are recorded in Hz (= (Delta/Gamma) * Gamma_nat); the saturation
# parameter s = I/Isat is recorded separately (a future cooling/scattering engine
# consumes detuning + Gamma + s). Beam POWER is not tabulated directly but
# follows from s * Isat * (beam area); Isat and the BD waist are recorded below.
# =============================================================================

- name: raman_detuning_from_p32
  value: -2.0e10                  # Hz, SIGNED: RED of S1/2->P3/2 (Delta = w_laser - w_0 < 0)
  units: Hz
  kind: input
  uncertainty: {value: 1.0e9, type: systematic}
  source:
    ref: doerr2024
    loc: "Sec. 2.1.4, p. 11"
    extraction_note: >-
      Two-photon stimulated-Raman (TPSR) single-photon detuning of the virtual
      level from the 3P_3/2 |F=4,mF=4> state: Delta_R/(2pi) = -20 GHz (RED of the
      S1/2->P3/2 transition; Raman line ~279.6 nm). SIGN (confirmed by UW 2026-06-22):
      Delta_R = w_laser - w_transition < 0 (red-detuned). Doerr quotes the magnitude
      "...detuned by 20 GHz from the P3/2 |F = 4, mF = 4> state"; the sign is red.
      Rate/scatter engines use |Delta_R| (magnitude); the light-shift sign follows it.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  caveats: >-
    Round nominal value (20 GHz); recorded uncertainty is an estimated tolerance.
    DETUNING HISTORY (resolved by UW 2026-06-19): the virtual-level detuning from
    P3/2 |F=4,mF=4> evolved 50 GHz (pre-2021) -> 200 GHz (Thomm 2021, after a new
    BBO cavity) -> 20 GHz (Doerr 2024 = CURRENT). The final reduction was
    deliberate: a new laser system + BBO-doubling-stage trouble, traded a smaller
    detuning for LARGER Rabi rates (Omega_Rabi proportional to 1/Delta_R). So 20 GHz
    is the current operating value (the Thomm 50/200 GHz are earlier epochs); the
    sideband/AC-Stark engines (proportional to 1/Delta_R, 1/Delta_R^2) use 20 GHz.
  status: provisional

# --- Raman (TPSR) beam combinations -----------------------------------------
# Two-photon stimulated-Raman drive (~279.6 nm, 20 GHz red of P3/2). Two blue
# (B1, B3) and two red (R1, R2) beams, all propagating in the trap x-z plane,
# combine pairwise; the effective k-vector Delta_k = k_B - k_R sets which
# motional mode is addressed. Polarisations (Clos Tab. 3.2): B1 pi, R1 sigma+ +
# sigma-, R2 sigma+ - sigma-. The 2x2 of {B1,B3} x {R1,R2} gives four named
# carriers (Doerr 2024, Sec. 2.1; Hasse 2025 glossary):
#   CC  = B1+R1 (parallel)     Delta_k ~ 0         carrier only (no motion)
#   OC  = B1+R2 (orthogonal)   Delta_k || z        axial lf mode
#   AC  = B3+R1 (antiparallel) Delta_k || -(x+z)   all three modes
#   ROC = B3+R2 (orthogonal)   Delta_k || x        radial modes
# Each Delta_k is recorded as the vector Delta_k/k in the trap x,y,z frame (k =
# single-beam wavenumber). The DIRECTION is what Doerr fixes ("|| x", "|| z",
# "|| -(x+z)"); the MAGNITUDE |Delta_k|/k follows from the beam angles (CC 0
# parallel, OC/ROC sqrt2 orthogonal, AC 2 antiparallel) and was confirmed
# jointly realizable by the projection verification. The mode-projection engine
# normalises these internally (so direction cosines are unchanged); the sideband
# engine uses the magnitude for absolute eta. Only the AXIS (not the overall
# SIGN) is physically pinned; the sign is immaterial because both engines use
# |Delta_k . e_mode|. The axial Lamb-Dicke anchor is raman_axial_lamb_dicke_25mg;
# the radial tilt is radial_mode_tilt_25mg (records/fields.yaml).

- name: raman_cc_combination_25mg
  value: [0.0, 0.0, 0.0]
  units: "k-vector Delta_k/k (trap x,y,z)"
  kind: input
  uncertainty: {value: 0.0, type: exact}
  source: {ref: doerr2024, loc: "Sec. 2.1.4, p. 12 (beam combinations)", extraction_note: "Colinear-Carrier CC = B1 (pi) + R1 (sigma+ + sigma-) superimposed PARALLEL -> Delta_k = k_B - k_R ~ 0. Confirmed by Hasse 2025 glossary (CC = co-linear carrier, B1 and R1).", extracted_by: claude-agent, extracted_on: 2026-06-18}
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "TPSR Colinear-Carrier; B1 + R1 parallel; carrier only (|down,n> <-> |up,n>), motion-insensitive (Lamb-Dicke ~ 0)"
  caveats: "Spin-only (carrier) operations; near-zero Lamb-Dicke -> no motional sideband coupling."
  status: provisional

