  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  configuration: null
  caveats: "Atomic constant (from the Friedenauer/LMU lineage). Lets beam power be recovered from the s = I/Isat values + the beam waist."
  status: provisional

