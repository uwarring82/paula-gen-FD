  source: {ref: doerr2024, loc: "Sec. 2.1.4, p. 12 (beam combinations)", extraction_note: "Radial Orthogonal Carrier ROC = B3 + R2 in another orthogonal configuration -> Delta_k parallel to the x-axis. Addresses the radial (mf/hf) modes.", extracted_by: claude-agent, extracted_on: 2026-06-18}
