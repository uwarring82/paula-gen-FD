  caveats: "Axial-mode (sideband) addressing along z."
  status: provisional

- name: raman_ac_combination_25mg
  value: [-1.41421356, 0.0, -1.41421356]   # 2 * -(x+z)/sqrt2 (antiparallel, |dk|=2)
  units: "k-vector Delta_k/k (trap x,y,z)"
  kind: input
  uncertainty: {value: 0.0, type: exact}
  source: {ref: doerr2024, loc: "Sec. 2.1.4, p. 12 + Fig. 2.4, p. 13 (beam combinations)", extraction_note: "Antilinear Carrier AC = B3 + R1, superimposed but ANTIPARALLEL -> Delta_k || -(e_x + e_z), at 45 deg to the lf-mode axis in the x-z plane. Has non-zero projection onto ALL THREE modes (axial lf + radial mf ~3.0 + radial hf ~4.5 MHz).", extracted_by: claude-agent, extracted_on: 2026-06-18}
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "TPSR Antilinear Carrier; B3 + R1 antiparallel; Delta_k || -(e_x+e_z), 45 deg to the lf-mode axis in the x-z plane; addresses all three modes"
  caveats: >-
    The only combination addressing all three modes. Radial coupling needs a
    TWO-STEP projection because the radial modes are tilted ~30 deg out of the
    x-z plane (see radial_mode_tilt_25mg): AC is projected onto x first, then
    onto the tilted radial axes.
  status: provisional

- name: raman_roc_combination_25mg
  value: [1.41421356, 0.0, 0.0]   # sqrt2 * x (orthogonal beams)
