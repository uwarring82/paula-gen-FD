  source: {ref: clos2017, loc: "Tab. 3.1, Sec. 3.1 (Delta/Gamma = -0.5)", extraction_note: "BD cooling-beam detuning Delta/Gamma = -0.5 -> -20.9 MHz. Doerr 2024 states '~20 MHz = half the natural linewidth'.", extracted_by: claude-agent, extracted_on: 2026-06-18}
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  conditions: "Blue Doppler cooling beam; sigma+; |3,3> <-> P3/2|4,4>; -0.5 Gamma; cools to ~1 mK; s = bd_cooling_saturation"
  caveats: "Detuning = (Delta/Gamma)*mg_p32_natural_linewidth. Consistent across Clos/Wittemer (legacy) and Doerr (freddy)."
