# =============================================================================
# records/beams.yaml  —  BEAMS domain
# Raman pair, cooling (BD), detection (BDX), preparation (RD/RP) beams. Each beam
# parameter (power/intensity, detuning, k-vector, polarisation, waist at the ion)
# is input by default — the twin consumes it (invariant 5).
#
# Canonical source: the laser-parameter table (Clos 2017, Tab. 3.1; confirmed by
# Wittemer 2019, Tab. 3.1), giving per beam: wavelength, polarisation,
# transition, natural linewidth Gamma_nat/(2pi), detuning Delta/Gamma_nat, and
# intensity I/Isat (the saturation parameter s). All BD/RD beams are sigma+.
# Detunings are recorded in Hz (= (Delta/Gamma) * Gamma_nat); the saturation
# parameter s = I/Isat is recorded separately (a future cooling/scattering engine
# consumes detuning + Gamma + s). Beam POWER is not tabulated directly but
# follows from s * Isat * (beam area); Isat and the BD waist are recorded below.
# =============================================================================

- name: raman_detuning_from_p32
  value: 20.0e9
  units: Hz
  kind: input
  uncertainty: {value: 1.0e9, type: systematic}
  source:
    ref: doerr2024
    loc: "Sec. 2.1.4, p. 11"
    extraction_note: >-
      Two-photon stimulated-Raman (TPSR) single-photon detuning of the virtual
      level from the 3P_3/2 |F=4,mF=4> state: Delta_R/(2pi) = 20 GHz (Raman line
      ~279.6 nm). Verbatim: "...detuned by Delta_R/(2pi) = 20 GHz from the
      P3/2 |F = 4, mF = 4> state".
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: freddy
  caveats: "Round nominal value (20 GHz); recorded uncertainty is an estimated tolerance."
  status: provisional

# --- shared constants -------------------------------------------------------

- name: mg_p32_natural_linewidth
  value: 4.18e7                    # Gamma(3P_3/2)/(2pi) = 41.8 MHz
  units: Hz
  kind: input
  uncertainty: {value: 2.0e5, type: systematic}
  source: {ref: clos2017, loc: "Tab. 3.1, Sec. 3.1", extraction_note: "Natural linewidth of the 25Mg+ 3S1/2->3P3/2 cooling/detection/Raman transition (~279.6 nm). Confirmed by Wittemer 2019 Tab. 3.1.", extracted_by: claude-agent, extracted_on: 2026-06-18}
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  configuration: null
  caveats: "Atomic constant (apparatus-independent). Sets the Doppler limit (~1 mK) and the BD cooling detuning (-Gamma/2)."
  status: provisional

- name: mg_p12_natural_linewidth
  value: 4.13e7                    # Gamma(3P_1/2)/(2pi) = 41.3 MHz
  units: Hz
  kind: input
  uncertainty: {value: 2.0e5, type: systematic}
  source: {ref: clos2017, loc: "Tab. 3.1, Sec. 3.1", extraction_note: "Natural linewidth of the 25Mg+ 3S1/2->3P1/2 repump transition (280.353 nm). Confirmed by Wittemer 2019 Tab. 3.1.", extracted_by: claude-agent, extracted_on: 2026-06-18}
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: direct
  derived_from: []
  generation: legacy
  configuration: null
  caveats: "Atomic constant. The RD/RP repumpers operate on this 3P_1/2 line."
  status: provisional

- name: mg_saturation_intensity
