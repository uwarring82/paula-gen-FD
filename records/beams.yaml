# --- Raman-beam polarizations + the fine-structure splitting ----------------
# Polarization- and power-resolved Raman light shifts / scattering (engine:
# spike/engines/raman_optical.py) need (a) the 3P_1/2-3P_3/2 fine-structure
# splitting and (b) each beam's polarization decomposition along the quantization
# axis B. POWER is a per-RUN setting (the .dat pwr_b1/b3/r1/r2), read by the twin;
# only the apparatus POLARIZATION + the atomic fine structure are recorded here.

- name: mg_fine_structure_splitting_3p_25mg
  value: 2.7457e12               # Hz = c(1/lambda_P32 - 1/lambda_P12); ~2.746 THz
  units: Hz
  kind: input                     # derived purely from inputs -> stays input
  uncertainty: {value: 1.0e9, type: systematic}   # wavelength-rounding dominated
  source:
    ref: clos2017
    loc: "derived: Delta_FS = c(1/lambda(P3/2) - 1/lambda(P1/2))"
    extraction_note: >-
      25Mg+ 3p 2P_1/2 - 2P_3/2 fine-structure splitting, derived ledger-internally
      from the two recorded D-line wavelengths bd_laser_wavelength (279.635 nm,
      S1/2->P3/2) and rd_laser_wavelength (280.353 nm, S1/2->P1/2):
      Delta_FS = c(1/279.635 - 1/280.353) nm^-1 = 2.7457e12 Hz. P3/2 is the higher
      level (shorter wavelength). Sets the sign/size of the vector light shift and
      the spin-flip (Raman) scattering: Delta_R = 20 GHz << Delta_FS, so the laser
      sits essentially on P3/2 alone and the vector shift is NOT fine-structure-
      suppressed (~0.5x the scalar for circular light).
    extracted_by: claude-agent
    extracted_on: 2026-06-22
  scope: {isotope: 25Mg, subsystem: optics}
  observation_type: derived
  derived_from: [bd_laser_wavelength, rd_laser_wavelength]
  generation: legacy
  caveats: >-
    From the two cited wavelengths (3 d.p. in nm), so good to ~1 GHz; a measured
    3p fine-structure interval would tighten it. Independent of the Raman epoch.
  status: provisional

