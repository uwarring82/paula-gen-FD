# --- precise MEASURED field from Weber 2025 Zeeman spectroscopy --------------

- name: b_field_zeeman_weber_25mg
  value: 5.6454e-4               # T (5.6454 G), measured via Zeeman spectroscopy
  units: T
  kind: input
  uncertainty: {value: 9.0e-8, type: systematic}    # 0.0009 G (weighted sample spread sw)
  source:
    ref: weber2025
    loc: "Eq. (4.2), p. 30; from Table 3, p. 29"
    extraction_note: >-
      Static field at the ion, B = 5.6454(9) G, determined by Zeeman
      spectroscopy of the 25Mg+ ground-state qubit transitions (weighted mean
      over 8 transitions). The (9) is the conservative weighted sample spread
      sw = 8.9e-4 G that Weber quotes (the standard error of the mean is much
      smaller, 5.6e-6 G).
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: apparatus, subsystem: fields}
  observation_type: fitted
  derived_from: []
  generation: freddy
  caveats: >-
    A precise MEASURED operating field — much tighter than the approximate ~5.5 G
    (b_field_quantization_freddy, Doerr) and consistent with the 5.61 G
    back-inferred from the Doerr clock (b_field_from_clock_25mg). Determined FROM
    the qubit transitions, so using it to predict those field-sensitive
    transitions is partly circular; the field-insensitive clock and the
    responsivities are the independent tests. configuration omitted (this IS a
    field, apparatus-dependent, not null) while provisional.
  status: provisional

# --- Doppler cooling limit (cooling-engine benchmark) ------------------------

- name: doppler_cooling_limit_25mg
  value: 1.0e-3                   # K (~1 mK)
  units: K
  kind: benchmark                # the cooling engine reproduces it from Gamma
  uncertainty: {value: 1.0e-4, type: systematic}    # theses quote "~1 mK"
  source:
    ref: doerr2024
    loc: "Sec. 2.1.1, p. 9 (Doppler limit ~1 mK)"
    extraction_note: >-
      Doppler cooling limit of 25Mg+ on the S1/2->P3/2 transition, T_D ~ 1 mK,
      stated by Doerr (and Kaufmann/Friedenauer). It is the theoretical limit
      T_D = hbar*Gamma/(2 k_B), reached at detuning -Gamma/2 (= the BD cooling
      setting).
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: motion}
  observation_type: inferred
  derived_from: []
  generation: legacy
  measured_on: 2024-01-01         # PLACEHOLDER: a theoretical limit, not a measurement
  conditions: "Doppler cooling on S1/2->P3/2, at the optimal detuning -Gamma/2"
  caveats: >-
    Theoretical limit T_D = hbar*Gamma/(2 k_B). The cooling engine reproduces it
    (1.003 mK) from mg_p32_natural_linewidth, so this is a THEORY-consistency
    check (both derive from Gamma), not an independent measurement; a measured
    Doppler temperature / mean phonon number would be a stronger benchmark.
    measured_on is a placeholder (theoretical limit, not measured).
  status: provisional

# --- radial-mode geometry (Raman addressing) ---------------------------------

- name: radial_mode_tilt_25mg
  value: 30.0
  units: degree
  kind: input
  uncertainty: {value: 5.0, type: systematic}
  source:
    ref: doerr2024
    loc: "Fig. 2.4 caption, p. 13"
    extraction_note: >-
      The two radial modes (mid-frequency ~3.0 MHz, high-frequency ~4.5 MHz) are
      NOT situated in the trap x-z plane but lie at an angle of ~30 deg to the x
      (or y) axis. Verbatim: "the radial modes are not situated within the x-z
      plane, but rather at an angle of 30 deg to the x or y-axis."
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: motion}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "Single 25Mg+; orientation of the radial mode axes in the trap x-y plane"
  caveats: >-
    Approximate (~30 deg); the radial mode orientation depends on the RF
    pseudopotential asymmetry (Wittemer 2019: the mode angle is non-zero even at
    kappa_xy = 0 for typical RF amplitudes). This tilt is why the AC Raman
    combination (k in the x-z plane) needs a two-step projection to address the
    radial modes (see raman_ac_combination_25mg in records/beams.yaml). NOTE:
    Doerr fixes only the two orthogonal radial directions and the 30 deg tilt, NOT
    which of the mid-/high-frequency modes (3.0 / 4.5 MHz) sits on which tilted
    axis; the engine's mf=near-x, hf=near-y assignment is a labelling convention
    and does not affect the projection magnitudes.
  status: provisional
