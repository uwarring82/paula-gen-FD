- name: b_field_quantization
  value: 5.85e-4
  units: T
  kind: input
  uncertainty: {value: 5.0e-6, type: systematic}    # quotation precision (±0.005 mT)
  source:
    ref: clos2017
    loc: "Sec. 3.1, p. 34"
    extraction_note: >-
      Magnetic-field magnitude defining the quantisation axis, |B| ~ 0.585 mT
      (= 5.85 G). Corroborated by Doerr 2024 (~5.5 G, Sec. 2.1.1, p. 7) and by
      the stated ~2pi*2.72 MHz splitting of adjacent ground-state Zeeman levels.
      Verbatim: "our with |B| ~ 0.585 mT".
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: apparatus, subsystem: fields}
  observation_type: inferred
  derived_from: []
  generation: legacy
  caveats: >-
    Source gives an approximate ('~') operating value; likely inferred from the
    Zeeman splitting. The Clos and Doerr values differ (5.85 G vs ~5.5 G),
    consistent with a generation-dependent calibration — do not treat as a
    single apparatus-wide constant.
  status: provisional

- name: b_field_quantization_freddy
  value: 5.5e-4                 # T (~5.5 G), the freddy-generation operating field
  units: T
  kind: input                   # independently calibrated -> a legitimate input
  uncertainty: {value: 1.0e-5, type: systematic}   # source states only "~5.5 G"
  source:
    ref: doerr2024
    loc: "Sec. 2.1.1, p. 7"
    extraction_note: >-
      Operating magnetic field of the freddy generation, |B| ~ 5.5 G, calibrated
      INDEPENDENTLY (from the ~2pi*2.72 MHz splitting of adjacent ground-state
      Zeeman levels) — NOT from the clock transition. Consumed by the twin to
      PREDICT the clock transition (clock_transition_predicted_25mg).
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: apparatus, subsystem: fields}
  observation_type: inferred
  derived_from: []
  generation: freddy
  caveats: >-
    Stated only as "~5.5 G", so its ~0.1 G uncertainty dominates the clock
    prediction. Distinct from the Clos-generation b_field_quantization (5.85 G).
    Because it is calibrated independently of the clock transition, it is a
    legitimate INPUT (no wall leakage); cf. b_field_from_clock_25mg, the field
    BACK-INFERRED from the clock benchmark (5.61 G). configuration omitted: this
    IS a freddy-generation field (apparatus-dependent, NOT null), left unset
    while provisional.
  status: provisional

# --- benchmark for the modes engine: the 2-ion axial stretch mode ------------

- name: omega_z_axial_stretch_2ion_25mg
  value: 2.23e6
  units: Hz
  kind: benchmark                # the modes engine predicts it from the COM input
  uncertainty: {value: 5.0e3, type: systematic}     # quotation precision (±0.005 MHz)
  source:
    ref: wittemer2019
    loc: "Table 3.2, p. 53 (Sec. 3.3)"
    extraction_note: >-
      Axial out-of-phase (stretch / breathing) mode of a two-ion 25Mg+/25Mg+
      crystal, omega/(2pi) = 2.23 MHz, same table as the in-phase (COM)
      omega_z_axial_com_25mg = 1.30 MHz.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: motion}
  observation_type: inferred
  derived_from: []
  generation: legacy
  measured_on: 2019-01-01         # PLACEHOLDER (Wittemer-2019 period) — see caveat
  conditions: "two-ion 25Mg+/25Mg+ linear crystal; axial out-of-phase (stretch) mode"
  caveats: >-
    Modes-engine WALL target: the engine predicts this as sqrt(3) * COM from the
    input omega_z_axial_com_25mg; it must NEVER be fed in. The sqrt(3) normal-mode
    relation holds to ~1% in the quoted (3-sig-fig) data (predicted 2.252 MHz vs
    measured 2.23 MHz). measured_on is a PLACEHOLDER for the Wittemer-2019 period;
    replace with the exact date before status: confirmed. Same
    determination-method caveat as the COM record.
  status: provisional
