- name: doppler_cooled_occupation_25mg
  value: 10.0                     # mean phonon number n-bar, Doppler cooled
  units: dimensionless
  kind: benchmark                 # the cooling engine reproduces it from Gamma + omega
  uncertainty: {value: 1.0, type: statistical}     # n-bar = 10(1)
  source:
    ref: clos2017
    loc: "Fig. 3.14 caption, p. 51"
    extraction_note: >-
      Measured mean phonon number of a single Doppler-cooled 25Mg+ ion,
      n_bar = 10(1), at omega_1/(2pi) = 1.915(2) MHz, from Rabi flops sensitive to
      the thermal motional distribution (Fig. 3.14, top). Clos's own estimate from
      the ~1 mK Doppler limit (Gamma = 41.8 MHz, delta = -Gamma/2, s = 0.5) is
      n_bar ~ 10 at 2 MHz, consistent.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: motion}
  observation_type: fitted
  derived_from: []
  generation: legacy
  measured_on: 2017-01-01         # APPROXIMATE: Clos 2017 thesis era; exact date not in source
  conditions: "Single 25Mg+, Doppler cooled (BD: delta=-Gamma/2, s=0.5); axial mode omega_1/(2pi)=1.915 MHz"
  caveats: >-
    The independent MEASURED motional benchmark for the cooling engine (vs the
    theory-consistency doppler_cooling_limit_25mg). The cooling engine predicts the
    thermal occupation at the Doppler limit, n_bar = 1/(exp(2*omega/Gamma)-1) ~ 10.4
    at 1.915 MHz, from Gamma and omega_z_axial_clos_25mg. T_D is the optimal-detuning
    FLOOR; the true Doppler steady-state n_bar depends on detuning/saturation/geometry
    and generally sits slightly above it, so the 0.42-sigma agreement validates that
    the BD setting (delta=-Gamma/2, s=0.5) is near-ideal rather than asserting the
    state is identically thermal at T_D. NOTE Clos's Fig. 3.14 is internally ambiguous
    about the probe (caption "Rabi flops on the stretch states" vs body text "carrier
    transition"); the n_bar=10(1) value itself is unambiguous. measured_on is
    approximate (thesis era).
  status: provisional

# --- radial-mode geometry (Raman addressing) ---------------------------------

- name: radial_mode_tilt_25mg
  value: 30.0
  units: degree
  kind: input
  uncertainty: {value: 5.0, type: systematic}
  source:
    ref: doerr2024
    loc: "Fig. 2.4 caption, p. 13"
    extraction_note: >-
      The two radial modes (mid-frequency ~3.0 MHz, high-frequency ~4.5 MHz) are
      NOT situated in the trap x-z plane but lie at an angle of ~30 deg to the x
      (or y) axis. Verbatim: "the radial modes are not situated within the x-z
      plane, but rather at an angle of 30 deg to the x or y-axis."
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: motion}
  observation_type: direct
  derived_from: []
  generation: freddy
  conditions: "Single 25Mg+; orientation of the radial mode axes in the trap x-y plane"
  caveats: >-
    Approximate (~30 deg); the radial mode orientation depends on the RF
    pseudopotential asymmetry (Wittemer 2019: the mode angle is non-zero even at
    kappa_xy = 0 for typical RF amplitudes). This tilt is why the AC Raman
    combination (k in the x-z plane) needs a two-step projection to address the
    radial modes (see raman_ac_combination_25mg in records/beams.yaml). NOTE:
    Doerr fixes only the two orthogonal radial directions and the 30 deg tilt, NOT
    which of the mid-/high-frequency modes (3.0 / 4.5 MHz) sits on which tilted
    axis; the engine's mf=near-x, hf=near-y assignment is a labelling convention
    and does not affect the projection magnitudes.
  status: provisional

