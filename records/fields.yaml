- name: b_field_quantization
  value: 5.85e-4
  units: T
  kind: input
  uncertainty: {value: 5.0e-6, type: systematic}    # quotation precision (±0.005 mT)
  source:
    ref: clos2017
    loc: "Sec. 3.1, p. 34"
    extraction_note: >-
      Magnetic-field magnitude defining the quantisation axis, |B| ~ 0.585 mT
      (= 5.85 G). Corroborated by Doerr 2024 (~5.5 G, Sec. 2.1.1, p. 7) and by
      the stated ~2pi*2.72 MHz splitting of adjacent ground-state Zeeman levels.
      Verbatim: "our with |B| ~ 0.585 mT".
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: apparatus, subsystem: fields}
  observation_type: inferred
  derived_from: []
  generation: legacy
  caveats: >-
    Source gives an approximate ('~') operating value; likely inferred from the
    Zeeman splitting. The Clos and Doerr values differ (5.85 G vs ~5.5 G),
