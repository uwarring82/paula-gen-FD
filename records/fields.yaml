# =============================================================================
# records/fields.yaml  —  FIELDS domain
# Analytical RF/DC E-fields and the B-field. The B-field defines the
# quantisation axis; every polarisation and k-vector elsewhere is expressed
# relative to it.
#
# PROVENANCE: seed records below were obtained by an automated extraction pass
# over the lineage theses (see docs/LOGBOOK.md, 2026-06-18) and are NOT yet
# human-reviewed -> all carry status: provisional. extracted_by records the
# automated extractor; re-attribute to the human reviewer on confirmation.
# Uncertainties tagged "quotation precision" are derived from the rounding of
# the quoted value, NOT from a stated experimental error.
# =============================================================================

