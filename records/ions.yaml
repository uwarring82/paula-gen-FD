# --- tension resolution: quadratic Zeeman shift + the field it implies -------
# nu_clock(B) = nu_hf0 + K*B^2, with K = g_J^2 mu_B^2 / (2 h^2 nu_hf0). Treating
# Itano's nu_hf0 as truth, the measured +69 kHz offset implies B ≈ 5.6 G — which
# matches Doerr's independently stated ~5.5 G, dissolving the apparent tension.

- name: qubit_quadratic_zeeman_coeff_25mg
  value: 2.1954e11               # Hz/T^2  (= 2195 Hz/G^2)
  units: Hz/T^2
  kind: input                    # depends only on nu_hf0 (input) + fundamental constants
  uncertainty: {value: 2.0e8, type: systematic}
  source:
    ref: itano_wineland_1981
    loc: "derived: K = g_J^2 mu_B^2 / (2 h^2 nu_hf0), Breit-Rabi small-x limit"
    extraction_note: >-
      Quadratic (second-order) Zeeman coefficient of the 25Mg+ |F=3,mF=0> <->
      |F=2,mF=0> clock transition: nu(B) = nu_hf0 + K*B^2 with
      K = g_J^2 mu_B^2 / (2 h^2 nu_hf0) = 2.195e11 Hz/T^2 (= 2195 Hz/G^2), using
      g_J(2S_1/2) = 2.00232 and nu_hf0 = hyperfine_splitting_calc_25mg.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: internal_state}
  observation_type: derived
  derived_from: [hyperfine_splitting_calc_25mg]
  generation: legacy
  configuration: null
  caveats: >-
    Leading-quadratic (small-x) Breit-Rabi approximation; the g_I (nuclear) term
    is neglected (~1/1836) and the free-electron g_J is used. Valid for the
    first-order-field-insensitive mF=0<->mF=0 clock transition. The spike levels
    engine retains the full (g_J mu_B - g_I mu_N) form, so its K is ~0.4 Hz/G^2
    (~0.02%) larger than this g_I-neglected value — immaterial at the current
    uncertainty.
  status: provisional

- name: b_field_from_clock_25mg
  value: 5.609e-4                # T  (= 5.609 G)
  units: T
  kind: benchmark                # inferred from the benchmark clock transition -> inherits benchmark
  uncertainty: {value: 1.1e-6, type: statistical}
  source:
    ref: itano_wineland_1981
    loc: "derived: B = sqrt((nu_clock - nu_hf0)/K) (Breit-Rabi inversion)"
    extraction_note: >-
      Operating magnetic field inferred from the measured clock transition with
      Itano & Wineland as ground truth: the second-order Zeeman shift
      nu_clock - nu_hf0 = 69.1 kHz and K = qubit_quadratic_zeeman_coeff_25mg give
      B = sqrt(Delta_nu / K) = 5.609 G. This DISSOLVES the earlier ~69 kHz
      tension — the offset is the quadratic Zeeman shift of the mF=0<->mF=0
      transition at finite field, not an error.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: apparatus, subsystem: fields}
  observation_type: derived
  derived_from: [clock_transition_25mg, hyperfine_splitting_calc_25mg, qubit_quadratic_zeeman_coeff_25mg]
  generation: freddy
  measured_on: 2024-01-01        # inherits clock_transition_25mg's validity window (placeholder)
  caveats: >-
    Benchmark-derived DIAGNOSTIC (inferred from the measured clock transition),
    NOT an independent field input — must never be fed back as a B-field input.
    The implied 5.61 G is consistent with the independent input
    b_field_quantization_freddy (~5.5 G) and, more loosely, the Clos-generation
    5.85 G (b_field_quantization). This is the field-space mirror of the
    frequency-space validation (clock_transition_predicted_25mg /
    clock_transition_residual_25mg). measured_on inherits clock_transition_25mg's
    placeholder date.
  status: provisional

