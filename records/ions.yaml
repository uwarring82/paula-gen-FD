# --- INPUT side of the wall: literature hyperfine splitting ------------------

- name: hyperfine_splitting_25mg_f2_f3
  value: 1.79e9
  units: Hz
  kind: input                     # known atomic structure the twin CONSUMES
  uncertainty: {value: 5.0e6, type: systematic}   # quotation precision (±0.005 GHz)
  source:
    ref: clos2017
    loc: "Sec. 3.1, p. 33"
    extraction_note: >-
      25Mg+ ground-state F=2 <-> F=3 hyperfine splitting, quoted as 2pi*1.79 GHz
      between |F=3,mF=0> and |F=2,mF=0>. Clos attributes the hyperfine constants
      to Itano & Wineland (1981) (cited p. 73). Friedenauer (2pi*1.77 GHz),
      Wittemer (~1.8 GHz) and Doerr (~1.79 GHz) agree to lower precision.
      Uncertainty here reflects the quoted rounding, not a stated error.
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: internal_state}
  observation_type: fitted        # original value determined by precision spectroscopy (Itano & Wineland)
  derived_from: []
  generation: legacy
  configuration: null             # atomic constant
  caveats: >-
    Coarse literature value (1.79 GHz). The original precision value (Itano &
    Wineland 1981) is ~1788.76 MHz; cite the original directly if higher
    precision is needed than the Clos rounding provides.
  status: provisional

- name: hyperfine_a_constant_25mg
  value: -5.96254376e8            # A = -596.254376(54) MHz (negative for 25Mg+)
  units: Hz
  kind: input
  uncertainty: {value: 5.4e1, type: statistical}   # 54 Hz: the (54) on the last two digits
  source:
    ref: itano_wineland_1981
    loc: "Abstract (p. 1364) and Eq. (2) (p. 1371)"
    extraction_note: >-
      Magnetic-dipole hyperfine constant of the 25Mg+ 3s 2S_1/2 ground state,
      A = -596.254 376(54) MHz — the primary precision measurement, stated
      identically in the Abstract and Eq. (2). The (54) is the 1-sigma
      uncertainty on the last two digits (54 Hz, NOT 54 kHz). Sign is negative:
      the manifold is inverted (F=3 lies below F=2).
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: internal_state}
  observation_type: fitted
  derived_from: []
  generation: legacy
  configuration: null
  caveats: >-
    Primary literature constant (the hyperfine reference UW added). Apparatus-
    independent. Supersedes the earlier ledger estimate |A| = Delta/3 from the
    coarse Clos splitting.
  status: confirmed

- name: hyperfine_splitting_calc_25mg
  value: 1.788763128e9           # Delta = 3|A| (Landé interval rule, 2S_1/2)
  units: Hz
  kind: input                     # derived purely from an input -> stays input
  uncertainty: {value: 1.62e2, type: statistical}   # 3 x 54 Hz
  source:
    ref: itano_wineland_1981
    loc: "derived: Delta = 3|A| from A in Eq. (2)"
    extraction_note: >-
      25Mg+ ground-state F=2<->F=3 hyperfine splitting computed from the primary
      hyperfine constant via the Landé interval rule: for a 2S_1/2 state (J=1/2)
      only the magnetic-dipole term contributes, so Delta = 3|A| = 1788.763 MHz.
      A ledger-internal derivation (the original paper reports A and the
      Zeeman-resolved transitions, not Delta directly).
    extracted_by: claude-agent
    extracted_on: 2026-06-18
  scope: {isotope: 25Mg, subsystem: internal_state}
  observation_type: derived
  derived_from: [hyperfine_a_constant_25mg]
  generation: legacy
  configuration: null
  caveats: >-
    Demonstrates the 'derived' machinery + benchmark-inheritance (closure is
    all-input -> stays input). This is the ZERO-FIELD splitting. RESOLVED
    (2026-06-18): the in-house clock_transition_25mg (1788.8322 MHz) is +69 kHz
    higher because it is the mF=0<->mF=0 transition at finite field B ≈ 5.6 G;
    that offset is the second-order (quadratic) Zeeman shift, not a discrepancy
    (see qubit_quadratic_zeeman_coeff_25mg and b_field_from_clock_25mg).
  status: provisional

