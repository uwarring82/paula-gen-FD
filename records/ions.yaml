# =============================================================================
# records/ions.yaml  —  IONS domain
# Mg ground-state structure. The schema is anchored on the 25Mg+ ground-state
# (3s 2S_1/2) HYPERFINE manifold (I = 5/2 -> F = 2 and F = 3, the qubit). The
# individual F states and the splitting are expressed as DISTINCT records.
# 24Mg and 26Mg are even isotopes (I = 0): they carry NO hyperfine manifold and
# express only a role (coolant / co-trapped) — never a faked manifold.
#
# This file also carries the worked input/benchmark WALL pair:
#   input     -> hyperfine_splitting_25mg_f2_f3  (literature atomic structure,
#                the twin consumes it)
#   benchmark -> clock_transition_25mg           (in-house precision measurement,
#                the twin must REPRODUCE it; never fed in)
#
# PROVENANCE / REVIEW: seed records are from an automated extraction pass
# (docs/LOGBOOK.md, 2026-06-18), not yet human-reviewed; most are provisional.
# =============================================================================

