# =============================================================================
# records/control.yaml  —  CONTROL / microwave-drive calibration
# =============================================================================
# Microwave Rabi rates Omega/(2pi) of the 25Mg+ ground-state hyperfine qubit
# transitions |F=3,mF> <-> |F=2,m'F>, from the measured pi-times: Omega/2pi =
# 1/(2 t_pi). These are apparatus CALIBRATION (kind: benchmark per the task card)
# and are NOT cleanly reproducible by an atomic engine: the absolute rate folds
# the MW antenna polarization geometry and frequency response (50 MHz-bandwidth
# filter), which DOMINATE the variation across the ~26 MHz manifold. The drive
# engine predicts only the relative atomic Clebsch-Gordan coupling; the residual
# measured/|CG| is the apparatus factor (see the drive diagnostic in
# spike/runner.py and docs/LOGBOOK.md). No `microwave` configuration slot is
# registered yet, so configuration is omitted.
#
# generation: Doerr 2024 = freddy (current apparatus); Kaufmann 2022 = legacy
# (earlier state). The drive is ~2-3x faster in freddy than in legacy.
# =============================================================================

# --- Doerr 2024, Table 2.1 (B ~ 5.5 G), all 8 transitions --------------------

